# Deploy — LoginPro WhatsApp Contingency
# Se dispara manualmente (workflow_dispatch) o automáticamente en push a main.
#
# Secretos requeridos en GitHub (Settings > Secrets and variables > Actions):
#   REGISTRY_URL        — URL del registry (ej: registry.digitalocean.com/mi-registry)
#   REGISTRY_USER       — usuario del registry
#   REGISTRY_PASSWORD   — token/password del registry
#   DEPLOY_SSH_HOST     — IP o hostname del servidor de producción
#   DEPLOY_SSH_USER     — usuario SSH
#   DEPLOY_SSH_KEY      — clave privada SSH (ED25519 recomendada)
#   DEPLOY_APP_DIR      — directorio remoto donde vive el docker-compose.yml

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # nunca cancelar deploys en curso

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login al registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build y push imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/loginpro-wa-contingency:latest
            ${{ secrets.REGISTRY_URL }}/loginpro-wa-contingency:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Deploy en servidor remoto (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_APP_DIR }}

            # Actualiza la imagen en el servidor.
            docker pull ${{ secrets.REGISTRY_URL }}/loginpro-wa-contingency:${{ github.sha }}

            # Reemplaza el tag :latest localmente.
            docker tag \
              ${{ secrets.REGISTRY_URL }}/loginpro-wa-contingency:${{ github.sha }} \
              ${{ secrets.REGISTRY_URL }}/loginpro-wa-contingency:latest

            # Recrea solo el servicio app (postgres y redis no se tocan).
            docker compose up -d --no-deps --pull never app

            # Espera a que el healthcheck pase antes de considerar el deploy exitoso.
            echo "Esperando healthcheck..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q app) 2>/dev/null || echo 'starting')
              echo "  [${i}/12] status: ${STATUS}"
              if [ "$STATUS" = "healthy" ]; then
                echo "Deploy exitoso."
                exit 0
              fi
              sleep 5
            done
            echo "TIMEOUT: el contenedor no pasó el healthcheck en 60s."
            docker compose logs --tail=50 app
            exit 1

      - name: Notificar éxito
        if: success()
        run: echo "::notice::Deploy completado — imagen ${{ github.sha }} activa en producción."

      - name: Notificar fallo
        if: failure()
        run: echo "::error::Deploy fallido. Revisa los logs del job."
